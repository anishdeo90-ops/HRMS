items:
  - key: form.travel_request.request
    label: Travel Request
    domain: expenses
    kind: form
    owner: finance
    source_ref: { system: frappe_hrms, module: expense, artifact: Travel Request, field_or_state: request_form }
    introduced_in_phase: 4
    db_table: form_schemas
    ts_export: FORM_KEYS
    api_routes: [app/api/hrms/travel/requests]
    ui_surfaces: ["app/(app)/travel/page.tsx"]
    tests: [tests/metadata/registry-contract.test.ts, tests/expenses/expenses-sql.test.ts]
    fields:
      - key: employee_id
        type: employee_reference
        storage_mapping: travel_requests.employee_id
        validation: [required]
        privacy_class: personal
        test_id: travel-request-employee
      - key: purpose
        type: textarea
        storage_mapping: travel_requests.purpose
        validation: [required]
        privacy_class: confidential
        test_id: travel-request-purpose
      - key: from_date
        type: date
        storage_mapping: travel_requests.from_date
        validation: [required]
        privacy_class: personal
        test_id: travel-request-from-date
      - key: to_date
        type: date
        storage_mapping: travel_requests.to_date
        validation: [required, after_or_same:from_date]
        privacy_class: personal
        test_id: travel-request-to-date
      - key: estimated_amount
        type: currency
        storage_mapping: travel_requests.estimated_amount
        validation: [required, positive]
        privacy_class: financial
        test_id: travel-request-estimated-amount
