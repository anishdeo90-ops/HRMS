items:
  - key: form.lifecycle.onboarding_template
    label: Onboarding Template
    domain: lifecycle
    kind: form
    owner: hr
    source_ref: { system: hirerabbits_hrms, module: lifecycle, artifact: Phase 7 Onboarding Template, field_or_state: form }
    introduced_in_phase: 7
    db_table: form_schemas
    ts_export: FORM_KEYS
    api_routes: [app/api/hrms/lifecycle/onboarding]
    ui_surfaces: [route.lifecycle.onboarding]
    tests: [tests/metadata/registry-contract.test.ts, tests/lifecycle/lifecycle-sql.test.ts]
    fields:
      - key: name
        type: text
        storage_mapping: employee_onboarding_templates.name
        validation: [required, unique]
        privacy_class: work
        test_id: onboarding-template-name
      - key: status
        type: select
        storage_mapping: employee_onboarding_templates.status
        validation: [required]
        options: [draft, active, archived]
        privacy_class: work
        test_id: onboarding-template-status
