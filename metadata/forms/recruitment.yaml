items:
  - key: form.recruitment.job_opening
    label: Job Opening
    domain: recruitment
    kind: form
    owner: talent
    source_ref: { system: hirerabbits_hrms, module: recruitment, artifact: Phase 10 Job Opening, field_or_state: form }
    introduced_in_phase: 10
    db_table: form_schemas
    ts_export: FORM_KEYS
    api_routes: [app/api/hrms/recruitment/jobs]
    ui_surfaces: [route.recruitment.overview]
    tests: [tests/metadata/registry-contract.test.ts, tests/recruitment/recruitment-sql.test.ts]
    fields:
      - key: title
        type: text
        storage_mapping: jobs.title
        validation: [required]
        privacy_class: work
        test_id: recruitment-job-opening-title
      - key: status
        type: select
        storage_mapping: jobs.status
        validation: [required]
        privacy_class: work
        test_id: recruitment-job-opening-status
      - key: headcount
        type: number
        storage_mapping: jobs.headcount
        validation: [required, positive]
        privacy_class: work
        test_id: recruitment-job-opening-headcount
