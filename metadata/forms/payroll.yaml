items:
  - key: form.payroll.salary_component
    label: Salary Component
    domain: payroll
    kind: form
    owner: finance
    source_ref: { system: frappe_hrms, module: payroll, artifact: Salary Component, field_or_state: form }
    introduced_in_phase: 5
    db_table: form_schemas
    ts_export: FORM_KEYS
    api_routes: [app/api/hrms/payroll/salary-components]
    ui_surfaces: [route.payroll.salary_structures]
    tests: [tests/metadata/registry-contract.test.ts, tests/payroll/payroll-sql.test.ts]
    fields:
      - key: code
        type: text
        storage_mapping: salary_components.code
        validation: [required, unique]
        privacy_class: payroll
        test_id: salary-component-code
      - key: component_type
        type: select
        storage_mapping: salary_components.component_type
        validation: [required]
        options: [earning, deduction, employer_contribution]
        privacy_class: payroll
        test_id: salary-component-type
      - key: amount
        type: currency
        storage_mapping: salary_structure_details.amount
        validation: [optional, non_negative]
        privacy_class: payroll
        test_id: salary-component-amount
