    owner: hr
    source_ref: { system: hirerabbits_hrms, module: performance, artifact: Phase 6 KRAs, field_or_state: form }
    introduced_in_phase: 6
    db_table: form_schemas
    ts_export: FORM_KEYS
    api_routes: [app/api/hrms/performance/goals]
    ui_surfaces: [route.performance.goals]
    tests: [tests/metadata/registry-contract.test.ts, tests/performance/performance-sql.test.ts]
    fields:
      - key: goal_id
        type: performance_goal_reference
        storage_mapping: performance_kras.goal_id
        validation: [optional]
        privacy_class: work
        test_id: performance-kra-goal
      - key: title
        type: text
        storage_mapping: performance_kras.title
        validation: [required]
        privacy_class: work
        test_id: performance-kra-title
