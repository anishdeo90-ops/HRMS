items:
  - key: form.performance.goal
    label: Performance Goal
    domain: performance
    kind: form
    owner: hr
    source_ref: { system: hirerabbits_hrms, module: performance, artifact: Phase 6 Goals, field_or_state: form }
    introduced_in_phase: 6
    db_table: form_schemas
    ts_export: FORM_KEYS
    api_routes: [app/api/hrms/performance/goals]
    ui_surfaces: [route.performance.goals]
    tests: [tests/metadata/registry-contract.test.ts, tests/performance/performance-sql.test.ts]
    fields:
      - key: employee_id
        type: employee_reference
        storage_mapping: performance_goals.employee_id
        validation: [required]
        privacy_class: personal
        test_id: performance-goal-employee
      - key: title
        type: text
        storage_mapping: performance_goals.title
        validation: [required]
        privacy_class: work
        test_id: performance-goal-title
      - key: weight
        type: number
        storage_mapping: performance_goals.weight
        validation: [required, range_0_100]
        privacy_class: work
        test_id: performance-goal-weight
