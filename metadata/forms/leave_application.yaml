        validation: [required]
        privacy_class: employment
        test_id: leave-from-date
      - key: to_date
        type: date
        storage_mapping: leave_applications.to_date
        validation: [required]
        privacy_class: employment
        test_id: leave-to-date
      - key: half_day
        type: boolean
        storage_mapping: leave_applications.half_day
        validation: []
        privacy_class: employment
        test_id: leave-half-day
      - key: reason
        type: textarea
        storage_mapping: leave_applications.reason
        validation: []
        privacy_class: employment
        test_id: leave-reason
      - key: attachment_path
        type: file
        storage_mapping: leave_applications.attachment_path
        validation: []
        privacy_class: confidential
        test_id: leave-attachment
