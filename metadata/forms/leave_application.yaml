items:
  - key: form.leave_application.request
    label: Leave Application
    domain: leave
    kind: form
    owner: hr
    source_ref: { system: hirerabbits_hrms, module: leave, artifact: Phase 5 Leave Management, field_or_state: application_form }
    introduced_in_phase: 5
    db_table: form_schemas
    ts_export: FORM_KEYS
    api_routes: [app/api/hrms/leave/applications]
    ui_surfaces: ["app/(app)/time/leave/page.tsx"]
    tests: [tests/metadata/registry-contract.test.ts, tests/leave/leave-api-contract.test.ts]
    fields:
      - key: employee_id
        type: employee
        storage_mapping: leave_applications.employee_id
        validation: [required]
        privacy_class: employment
        test_id: leave-employee
      - key: leave_type_key
        type: select
        storage_mapping: leave_applications.leave_type_key
        validation: [required]
        privacy_class: employment
        test_id: leave-type
      - key: from_date
