items:
  - key: workflow.leave.application
    label: Leave Application
    domain: leave
    kind: workflow
    owner: hr
    source_ref: { system: hirerabbits_hrms, module: leave, artifact: Phase 5 Leave Management, field_or_state: application_status }
    introduced_in_phase: 5
    db_table: workflow_states
    ts_export: WORKFLOW_KEYS
    api_routes: [app/api/hrms/leave/applications, "app/api/hrms/leave/applications/[id]"]
    ui_surfaces: [route.time.leave, route.time.approvals]
    tests: [tests/metadata/registry-contract.test.ts, tests/leave/leave-sql.test.ts]
    states: [draft, submitted, approved, rejected, cancelled]
    transitions:
      - from: draft
        to: submitted
        permission: permission.leave.apply
      - from: submitted
        to: approved
        permission: permission.leave.approve
      - from: submitted
        to: rejected
        permission: permission.leave.approve
      - from: submitted
        to: cancelled
        permission: permission.leave.cancel
      - from: approved
        to: cancelled
        permission: permission.leave.cancel
      - from: draft
        to: cancelled
        permission: permission.leave.cancel
    terminal_states: [approved, rejected, cancelled]
    permissions: [permission.leave.apply, permission.leave.approve, permission.leave.cancel]
  - key: workflow.employee.status
    label: Employee Status
    domain: employee_core
    kind: workflow
    owner: hr
    source_ref: { system: hirerabbits_hrms, module: employee_core, artifact: Phase 3 Employee Core, field_or_state: employment_status }
    introduced_in_phase: 3
    db_table: workflow_states
    ts_export: WORKFLOW_KEYS
    api_routes: [app/api/hrms/employees, "app/api/hrms/employees/[id]"]
    ui_surfaces: [route.people.employees]
    tests: [tests/metadata/registry-contract.test.ts, tests/employee-core/employee-core-sql.test.ts]
    states: [draft, active, inactive, exited]
    transitions:
      - from: draft
        to: active
        permission: permission.employee.manage
      - from: active
        to: inactive
        permission: permission.employee.manage
      - from: inactive
        to: active
        permission: permission.employee.manage
      - from: active
        to: exited
        permission: permission.employee.manage
    terminal_states: [exited]
    permissions: [permission.employee.view, permission.employee.manage]
  - key: workflow.attendance.day_status
    label: Attendance Day Status
    domain: attendance
    kind: workflow
    owner: hr
    source_ref: { system: hirerabbits_hrms, module: attendance, artifact: Phase 4 Attendance, field_or_state: day_status }
    introduced_in_phase: 4
    db_table: workflow_states
    ts_export: WORKFLOW_KEYS
    api_routes: [app/api/hrms/attendance/days]
    ui_surfaces: [route.time.attendance]
    tests: [tests/metadata/registry-contract.test.ts, tests/attendance/attendance-sql.test.ts]
    states: [present, absent, half_day, late, on_duty, holiday, weekly_off]
    transitions:
      - from: absent
        to: present
        permission: permission.attendance.manage
      - from: late
        to: present
        permission: permission.attendance.manage
    terminal_states: []
    permissions: [permission.attendance.view_self, permission.attendance.manage]
