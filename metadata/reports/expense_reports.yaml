items:
  - key: report.expenses.unpaid_claims
    label: Unpaid Expense Claims
    domain: expenses
    kind: report
    owner: finance
    source_ref: { system: frappe_hrms, module: expense, artifact: Expense Claim, field_or_state: unpaid_claims_report }
    introduced_in_phase: 4
    db_table: report_definitions
    ts_export: REPORT_KEYS
    api_routes: [app/api/hrms/expenses/claims]
    ui_surfaces: [route.finance.expense_claims]
    tests: [tests/metadata/registry-contract.test.ts, tests/expenses/expenses-sql.test.ts]
    source_tables: [expense_claims, expense_claim_items, employees]
    filters: [employee, department, claim_type, status, posting_date]
    columns: [employee, claim_number, posting_date, amount, status, approver]
    permission: permission.expenses.manage
    export_behavior: csv
    fixture: tests/fixtures/reports/expenses_unpaid_claims.json
